<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poptávka</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1117;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* 🔙 ZPĚT */
  .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #f5c400;
    color: #000;
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    z-index: 1000;
  }

  .back-btn:hover {
    background: #ffd84d;
  }

  /* 📦 FORM */
  .form-box {
    width: 100%;
    max-width: 600px; /* širší formulář */
    background: #ffffff;
    padding: 50px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  h1 {
    text-align: center;
    margin-bottom: 40px;
    color: #000;
  }

  input, textarea, select {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background: #ffffff;
    font-size: 16px;
    color: #000;
    box-sizing: border-box;
  }

  textarea {
    min-height: 150px;
    resize: vertical;
  }

  select:invalid {
    color: #777;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #f5c400;
    box-shadow: 0 0 0 3px rgba(245,196,0,0.2);
  }

  /* 🔘 BUTTON */
  button {
    width: 100%;
    padding: 18px;
    background: #f5c400;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
    color: #000;
    transition: 0.2s ease;
  }

  button:hover {
    background: #ffd84d;
    transform: translateY(-2px);
  }

/* TABLET */
@media (max-width: 900px) {
  .content-wrapper {
    flex-direction: column;
    margin: 60px auto;
    gap: 30px;
    padding: 0 20px;
  }

  h1 {
    font-size: 2rem;
  }
}

/* MOBIL */
@media (max-width: 600px) {
  header {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  nav {
    justify-content: center;
    width: 100%;
  }

  header img {
    height: 50px;
  }

  .content-wrapper {
    margin: 40px auto;
    padding: 0 15px;
  }

  h1 {
    font-size: 1.6rem;
  }

  p {
    font-size: 1rem;
  }

  .btn {
    width: 100%;
    text-align: center;
  }
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Zpět na hlavní stránku</a>

<div class="form-box">
  <h1>Poptávka elektrikáře</h1>

  <form action="https://formsubmit.co/zapojeno.elektro@gmail.com" method="POST">

    <!-- Nastavení FormSubmit -->
    <input type="hidden" name="_subject" value="Nová poptávka z webu">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="jmeno" placeholder="Jméno a příjmení" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="tel" name="telefon" placeholder="Telefon">

    <select name="sluzba" required>
      <option value="" disabled selected hidden>Vyberte typ práce</option>
      <option value="byt">Bytové elektroinstalace</option>
      <option value="revize">Revize</option>
      <option value="opravy">Opravy</option>
      <option value="kamery">Kamerové a zabezpečovací systémy</option>
      <option value="hromosvody">Hromosvody</option>
      <option value="smart">Chytrá domácnost</option>
      <option value="slaboproud">Slaboproudé rozvody</option>
      <option value="spotrebice">Zapojení spotřebičů</option>
      <option value="osvetleni">Modernizace osvětlení</option>
      <option value="projekt">Projektční práce</option>
      <option value="rozvadece">Výroba rozvaděčů</option>
      <option value="jiny">Jiný...</option>
    </select>

    <textarea name="zprava" placeholder="Podrobně popište problém / poptávku..." required></textarea>

    <button type="submit">ODESLAT POPTÁVKU</button>

  </form>
</div>

</body>
</html>
